<div class="col-sm-6 col-lg-3">
  <div class="card card-border-shadow-info h-100">
    <div class="card-body">
      <div class="d-flex align-items-center mb-2">
        <div class="avatar me-4">
          <span class="avatar-initial rounded-3 bg-label-info">
            <i class="icon-base ri ri-time-line icon-24px"></i>
          </span>
        </div>
        <h4 class="mb-0 clock-time" data-tz="Europe/Warsaw" id="clock-warsaw">--:--:--</h4>
      </div>
      <h6 class="mb-0 fw-normal">Warsaw</h6>
      <p class="mb-0 text-body-secondary small clock-date" data-tz="Europe/Warsaw" id="date-warsaw"></p>
    </div>
  </div>
</div>
