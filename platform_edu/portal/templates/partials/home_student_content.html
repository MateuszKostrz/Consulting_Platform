<!-- STUDENT HOME -->

<!-- Stat squares — full width, 4 across -->
<div class="row g-6 mb-6">
  <div class="col-6 col-lg-3">
    <div class="card card-border-shadow-danger h-100">
      <div class="card-body">
        <div class="d-flex align-items-center mb-2">
          <div class="avatar me-4">
            <span class="avatar-initial rounded-3 bg-label-danger">
              <i class="icon-base ri ri-alarm-warning-line icon-24px"></i>
            </span>
          </div>
          <h4 class="mb-0">{{ deadline_urgent_count }}</h4>
        </div>
        <h6 class="mb-0 fw-normal">Urgent deadlines</h6>
      </div>
    </div>
  </div>
  <div class="col-6 col-lg-3">
    <div class="card card-border-shadow-primary h-100">
      <div class="card-body">
        <div class="d-flex align-items-center mb-2">
          <div class="avatar me-4">
            <span class="avatar-initial rounded-3 bg-label-primary">
              <i class="icon-base ri ri-calendar-event-line icon-24px"></i>
            </span>
          </div>
          <h4 class="mb-0">{{ deadline_today_count }}</h4>
        </div>
        <h6 class="mb-0 fw-normal">Deadlines today</h6>
      </div>
    </div>
  </div>
  <div class="col-6 col-lg-3">
    <div class="card card-border-shadow-warning h-100">
      <div class="card-body">
        <div class="d-flex align-items-center mb-2">
          <div class="avatar me-4">
            <span class="avatar-initial rounded-3 bg-label-warning">
              <i class="icon-base ri ri-time-line icon-24px"></i>
            </span>
          </div>
          <h4 class="mb-0">{{ deadline_upcoming_count }}</h4>
        </div>
        <h6 class="mb-0 fw-normal">Next 7 days</h6>
      </div>
    </div>
  </div>
  <div class="col-6 col-lg-3">
    <div class="card card-border-shadow-success h-100">
      <div class="card-body">
        <div class="d-flex align-items-center mb-2">
          <div class="avatar me-4">
            <span class="avatar-initial rounded-3 bg-label-success">
              <i class="icon-base ri ri-checkbox-line icon-24px"></i>
            </span>
          </div>
          <h4 class="mb-0">{{ todo_total_count }}</h4>
        </div>
        <h6 class="mb-0 fw-normal">To-do items</h6>
      </div>
    </div>
  </div>
</div>

<!-- Deadlines + Credentials -->
<div class="row g-6 align-items-stretch">
  <div class="col-12 col-lg-6 d-flex flex-column">
    <div style="min-height: 480px;">
      {% include 'partials/deadlines_card.html' %}
    </div>
  </div>
  <div class="col-12 col-lg-6 d-flex flex-column">
    {% include 'partials/credentials_card.html' %}
  </div>
</div>
