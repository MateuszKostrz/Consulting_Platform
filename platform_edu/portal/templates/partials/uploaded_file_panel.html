{% load portal_extras %}
{% if current_file %}
<div class="uploaded-file-panel file-upload-box border border-2 rounded p-4 text-center h-100 d-flex flex-column justify-content-center">
  <i class="icon-base ri ri-file-text-line icon-32px text-heading mb-2 d-block"></i>
  <p class="mb-1 fw-medium">{{ file_label }}</p>
  <p class="small text-body-secondary mb-3 text-break">{{ current_file|basename }}</p>
  <div class="d-flex flex-wrap gap-2 justify-content-center">
    <a href="{{ current_file.url }}" class="btn btn-sm btn-outline-primary" download>
      <i class="icon-base ri ri-download-line me-1"></i>Download
    </a>
    {% if can_delete %}
    <form method="post" class="d-inline" onsubmit="return confirm('Delete this file? You can upload a new one afterwards.');">
      {% csrf_token %}
      <input type="hidden" name="action" value="delete_file" />
      <input type="hidden" name="field_name" value="{{ field_name }}" />
      {% if stage_key %}
      <input type="hidden" name="stage_key" value="{{ stage_key }}" />
      {% endif %}
      <button type="submit" class="btn btn-sm btn-outline-danger">
        <i class="icon-base ri ri-delete-bin-line me-1"></i>Delete
      </button>
    </form>
    {% endif %}
  </div>
</div>
{% endif %}
