<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ask ChatGPT</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f8;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .chat-container {
      width: 500px;
      height: 500px;
      margin: auto;
      padding: 20px;
      flex-direction: column;
      border: 1px solid #ccc;
      background-color: #fff;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
      overflow-y: auto;
    }

    .message {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 80%;
    }

    .user-message {
      align-self: flex-end;
      background-color: #dcf8c6;
    }

    .bot-message {
      align-self: flex-start;
      background-color: #e5e5ea;
    }

    .input-container {
      display: flex;
      max-width: 700px;
      margin: auto;
      padding: 10px;
      background: #fff;
      border-top: 1px solid #ddd;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      padding: 10px 15px;
      margin-left: 10px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background-color: #4caf50;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="chat-container" id="chat">
    <!-- Messages will appear here -->
  </div>

  <div class="input-container">
    <input type="text" id="user-input" placeholder="Ask your question here..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById('user-input');
      const chat = document.getElementById('chat');
      const userMessage = input.value.trim();
      if (!userMessage) return;

      // Show user message
      const userMsgElem = document.createElement('div');
      userMsgElem.className = 'message user-message';
      userMsgElem.innerText = userMessage;
      chat.appendChild(userMsgElem);
      input.value = '';

      // Show placeholder bot message
      const botMsgElem = document.createElement('div');
      botMsgElem.className = 'message bot-message';
      botMsgElem.innerHTML = '<em>ChatGPT is thinking...</em>';
      chat.appendChild(botMsgElem);

      chat.scrollTop = chat.scrollHeight;

      try {
        // Send request to your backend API
        const response = await fetch('/api/chatgpt-query/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')  // Remove this line if not using Django
          },
          body: JSON.stringify({
            user_question: userMessage
          })
        });

        if (!response.ok) throw new Error('Network response was not OK');

        const data = await response.json();

        botMsgElem.innerText = data.response || '❌ Sorry, I could not generate a response.';
      } catch (err) {
        console.error('Error:', err);
        botMsgElem.innerText = '❌ An error occurred. Please try again.';
      }

      chat.scrollTop = chat.scrollHeight;
    }

    // Helper to get CSRF token if you're using Django
    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

    // Optional: Send on Enter
    document.getElementById('user-input').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });
  </script>

</body>
</html>
