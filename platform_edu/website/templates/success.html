{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="{% static 'website/images/platform_logo.svg' %}">
    <link rel="alternate icon" href="{% static 'website/images/safari_logo2_prev_ui.png' %}" type="image/png">
    <meta property="og:image" content="https://academy.edunade.com/static/website/images/Edunade_Vertical_Black_RGB.png">

    
    <title>Payment Successful</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            text-align: center;
            background: #f8f9fa;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: #333;
        }
        
        .success-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .success-card {
            background: white;
            border-radius: 12px;
            padding: 50px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            max-width: 500px;
            width: 100%;
            border: 1px solid #e9ecef;
        }
        
        .success-icon {
            width: 64px;
            height: 64px;
            background-color: #28a745;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        
        .success-icon::before {
            content: "\2713";
            font-size: 32px;
            color: #fff;
            font-weight: bold;
        }
        
        .success-title {
            font-size: 26px;
            font-weight: 600;
            color: #212529;
            margin-bottom: 12px;
        }
        
        .success-message {
            font-size: 16px;
            color: #6c757d;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        
        .success-button {
            background: #696cff;
            color: white;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
            display: inline-block;
            transition: background-color 0.2s;
        }
        
        .success-button:hover {
            background: #5f63f2;
            text-decoration: none;
            color: white;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-card">
            <div class="success-icon"></div>
            
            <h1 class="success-title">Payment Successful!</h1>
            <p class="success-message">
                Thank you for your payment! Your transaction has been completed successfully. Time to start learning 😉
            </p>

  
            
            <a href="{% url 'home' %}" class="success-button">
                Return to Edunade Academy
            </a>
        </div>
    </div>
</body>
</html>
