<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Editor - Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/iconify@3.1.1/dist/iconify.min.css" rel="stylesheet">
    <script src="https://cdn.ckeditor.com/4.22.1/standard/ckeditor.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <style>
        .preview-box {
            min-height: 120px;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            padding: 1rem;
            background-color: #f8f9fa;
            line-height: 1.6;
            overflow-y: auto;
            max-height: 300px;
        }
        .latex-toolbar {
            margin-bottom: 15px;
            padding: 10px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
        }
        .latex-toolbar button {
            margin-right: 5px;
            margin-bottom: 5px;
        }
        .ckeditor-container {
            margin-bottom: 15px;
        }
        .question {
            margin-top: 20px;
            margin-bottom: 10px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <div class="row">
            <div class="col-12">
                <h1 class="mb-4">Question Editor</h1>
                
                <!-- Selection Controls -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0">Select Question</h5>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label for="subjectSelect" class="form-label">Subject</label>
                                <select class="form-select" id="subjectSelect">
                                    <option value="">Select Subject</option>
                                    <option value="math_ai_hl">Math AI HL</option>
                                    <option value="math_ai_sl">Math AI SL</option>
                                    <option value="math_aa_hl">Math AA HL</option>
                                    <option value="math_aa_hl_backup">Math AA HL (Backup)</option>
                                    <option value="math_aa_sl">Math AA SL</option>
                                    <option value="biology_hl">Biology HL</option>
                                    <option value="biology_sl">Biology SL</option>
                                    <option value="physics_hl">Physics HL</option>
                                    <option value="physics_sl">Physics SL</option>
                                    <option value="comp_sci_hl">Computer Science HL</option>
                                    <option value="comp_sci_sl">Computer Science SL</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="chapterSelect" class="form-label">Chapter</label>
                                <select class="form-select" id="chapterSelect" disabled>
                                    <option value="">Select Chapter</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="questionSelect" class="form-label">Question</label>
                                <select class="form-select" id="questionSelect" disabled>
                                    <option value="">Select Question</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Question Content Editor -->
                <div class="card mb-4" id="questionDisplayCard" style="display: none;">
                    <div class="card-header">
                        <h5 class="mb-0">Edit Question Content</h5>
                    </div>
                    <div class="card-body">
                        <!-- LaTeX Math Toolbar -->
                        <div class="latex-toolbar">
                            <div class="row">
                                <div class="col-md-8">
                                    <label class="form-label mb-2"><strong>LaTeX Math Symbols:</strong></label><br>
                                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertLatex('\\\\frac{}{}')" title="Fraction">\\frac{}{}</button>
                                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertLatex('\\\\sqrt{}')" title="Square Root">\\sqrt{}</button>
                                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertLatex('x^{}')" title="Superscript">x^{}</button>
                                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertLatex('x_{}')" title="Subscript">x_{}</button>
                                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertLatex('\\\\sum_{i=1}^{n}')" title="Summation">∑</button>
                                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertLatex('\\\\int_{a}^{b}')" title="Integral">∫</button>
                                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertLatex('\\\\lim_{x \\\\to }')" title="Limit">lim</button>
                                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertLatex('\\\\alpha')" title="Alpha">α</button>
                                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertLatex('\\\\beta')" title="Beta">β</button>
                                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertLatex('\\\\theta')" title="Theta">θ</button>
                                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertLatex('\\\\pi')" title="Pi">π</button>
                                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertLatex('\\\\leq')" title="≤">≤</button>
                                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertLatex('\\\\geq')" title="≥">≥</button>
                                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertLatex('\\\\neq')" title="≠">≠</button>
                                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertLatex('\\\\infty')" title="∞">∞</button>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label mb-2"><strong>Question Parts:</strong></label><br>
                                    <div class="mb-2">
                                        <button type="button" class="btn btn-sm btn-outline-primary" onclick="insertQuestionPart('A')" title="Insert part A)">A)</button>
                                        <button type="button" class="btn btn-sm btn-outline-primary" onclick="insertQuestionPart('B')" title="Insert part B)">B)</button>
                                        <button type="button" class="btn btn-sm btn-outline-primary" onclick="insertQuestionPart('C')" title="Insert part C)">C)</button>
                                        <button type="button" class="btn btn-sm btn-outline-primary" onclick="insertQuestionPart('D')" title="Insert part D)">D)</button>
                                        <button type="button" class="btn btn-sm btn-outline-primary" onclick="insertQuestionPart('E')" title="Insert part E)">E)</button>
                                    </div>
                                    <div>
                                        <button type="button" class="btn btn-sm btn-outline-primary" onclick="insertQuestionPart('i')" title="Insert part i)">i)</button>
                                        <button type="button" class="btn btn-sm btn-outline-primary" onclick="insertQuestionPart('ii')" title="Insert part ii)">ii)</button>
                                        <button type="button" class="btn btn-sm btn-outline-primary" onclick="insertQuestionPart('iii')" title="Insert part iii)">iii)</button>
                                        <button type="button" class="btn btn-sm btn-outline-success" onclick="insertQuestionPart('Custom')" title="Insert custom part">?</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Question Content Editing -->
                        <div class="mb-4">
                            <h6>Question Content</h6>
                            <div class="row">
                                <div class="col-md-6">
                                    <label for="questionContentInput" class="form-label">Question Text</label>
                                    <div class="ckeditor-container">
                                        <textarea class="form-control" id="questionContentInput" rows="6" 
                                            placeholder="Enter the question content here..."></textarea>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Question Preview</label>
                                    <div class="preview-box" id="questionContentPreview">
                                        Question content will appear here...
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Answer Content Editing -->
                        <div class="mb-3">
                            <h6>Answer Content</h6>
                            <div class="row">
                                <div class="col-md-6">
                                    <label for="answerContentInput" class="form-label">Answer Text</label>
                                    <div class="ckeditor-container">
                                        <textarea class="form-control" id="answerContentInput" rows="4" 
                                            placeholder="Enter the answer content here..."></textarea>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Answer Preview</label>
                                    <div class="preview-box" id="answerContentPreview">
                                        Answer content will appear here...
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Question Metadata Editor -->
                <div class="card mb-4" id="editorCard" style="display: none;">
                    <div class="card-header">
                        <h5 class="mb-0">Edit Question Metadata</h5>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                                                         <div class="col-md-3">
                                 <label for="paperSelect" class="form-label">Paper</label>
                                 <select class="form-select" id="paperSelect">
                                     <!-- Paper options will be populated dynamically -->
                                 </select>
                             </div>
                            <div class="col-md-3">
                                <label for="difficultySelect" class="form-label">Difficulty</label>
                                <select class="form-select" id="difficultySelect">
                                    <option value="Easy">Easy</option>
                                    <option value="Medium">Medium</option>
                                    <option value="Hard">Hard</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="typeSelect" class="form-label">Access Type</label>
                                <select class="form-select" id="typeSelect">
                                    <option value="free">Free</option>
                                    <option value="registered">Registered</option>
                                    <option value="premium">Premium</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="marksInput" class="form-label">Marks</label>
                                <input type="number" class="form-control" id="marksInput" min="1" max="50">
                            </div>
                        </div>
                        <div class="row g-3 mt-2" id="correctAnswerRow" style="display: none;">
                            <div class="col-md-3">
                                <label for="correctAnswerSelect" class="form-label">Correct Answer</label>
                                <select class="form-select" id="correctAnswerSelect">
                                    <option value="A">A</option>
                                    <option value="B">B</option>
                                    <option value="C">C</option>
                                    <option value="D">D</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="row mt-3">
                            <div class="col-12">
                                <button class="btn btn-primary" id="saveButton" onclick="saveQuestion()">
                                    <i class="iconify" data-icon="mdi:content-save"></i> Save Changes
                                </button>
                                <button class="btn btn-secondary ms-2" id="resetButton" onclick="resetForm()">
                                    <i class="iconify" data-icon="mdi:refresh"></i> Reset
                                </button>
                                <button class="btn btn-danger ms-2" id="deleteButton" onclick="deleteQuestion()">
                                    <i class="iconify" data-icon="mdi:delete"></i> Delete Question
                                </button>

                                <!-- Delete Confirmation Modal -->
                                <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
                                    <div class="modal-dialog modal-dialog-centered">
                                        <div class="modal-content">
                                            <div class="modal-header">
                                                <h5 class="modal-title">Delete Question</h5>
                                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                            </div>
                                            <div class="modal-body">
                                                <p>Are you sure you want to delete this question? This action cannot be undone.</p>
                                            </div>
                                            <div class="modal-footer">
                                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                                <button type="button" class="btn btn-danger" id="confirmDeleteButton">Yes, Delete Question</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Status Messages -->
                <div id="statusMessage" class="alert" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>

        // Event listeners
        // Initialize CKEditor for content editing
        if (typeof CKEDITOR !== 'undefined') {
            // Question Content Editor
            questionContentEditor = CKEDITOR.replace('questionContentInput', {
                toolbar: [
                    { name: 'basicstyles', items: ['Bold', 'Italic', 'Underline', 'Strike'] },
                    { name: 'paragraph', items: ['JustifyLeft', 'JustifyCenter', 'JustifyRight', 'JustifyBlock'] },
                    { name: 'lists', items: ['NumberedList', 'BulletedList'] },

                removePlugins: 'elementspath',
                resize_enabled: false,
                allowedContent: true,
                extraAllowedContent: 'p(*){*}[*];div(*){*}[*]'

            // Answer Content Editor
            answerContentEditor = CKEDITOR.replace('answerContentInput', {
                toolbar: [

                    { name: 'paragraph', items: ['JustifyLeft', 'JustifyCenter', 'JustifyRight', 'JustifyBlock'] },
                    { name: 'lists', items: ['NumberedList', 'BulletedList'] },
                    { name: 'insert', items: ['Table', 'HorizontalRule'] },

            // Focus tracking and content change handlers
            questionContentEditor.on('focus', function() {
                lastFocusedEditor = 'question';
            });

            answerContentEditor.on('focus', function() {
                lastFocusedEditor = 'answer';
            });

            questionContentEditor.on('change', function() {
                updateContentPreview('question');
            });

            answerContentEditor.on('change', function() {
                updateContentPreview('answer');
            });

            // Also listen for key events for real-time updates
            questionContentEditor.on('key', function() {

        document.getElementById('subjectSelect').addEventListener('change', function() {
            const subject = this.value;
            const chapterSelect = document.getElementById('chapterSelect');
            const questionSelect = document.getElementById('questionSelect');
            
            // Reset dependent dropdowns
            chapterSelect.innerHTML = '<option value="">Select Chapter</option>';
            questionSelect.innerHTML = '<option value="">Select Question</option>';
            chapterSelect.disabled = !subject;
            questionSelect.disabled = true;
            hideQuestionDisplay();
            
            // Populate paper options for the selected subject
            populatePaperOptions(subject);
            
            // Show/hide correct answer field based on subject
            const correctAnswerRow = document.getElementById('correctAnswerRow');
            if (subject && (subject.includes('biology') || subject.includes('physics'))) {
                correctAnswerRow.style.display = 'block';
            } else {
                correctAnswerRow.style.display = 'none';
            }
            
            // No special chapter selection needed (simplified)
            
            if (subject && subjectChapters[subject]) {
                subjectChapters[subject].forEach(chapter => {
                    const option = document.createElement('option');
                    option.value = chapter;
                    option.textContent = formatChapterName(chapter);
                    chapterSelect.appendChild(option);
                });
            }
        });

        document.getElementById('chapterSelect').addEventListener('change', function() {
            const subject = document.getElementById('subjectSelect').value;
            const chapter = this.value;
            const questionSelect = document.getElementById('questionSelect');
            
            questionSelect.innerHTML = '<option value="">Select Question</option>';
            questionSelect.disabled = !chapter;
            hideQuestionDisplay();
            
            if (subject && chapter) {
                fetchQuestions(subject, chapter);
            }
        });

        document.getElementById('questionSelect').addEventListener('change', function() {
            const questionId = this.value;
            if (questionId) {
                loadQuestion(questionId);
            } else {
                hideQuestionDisplay();
            }
        });

        function insertLatex(latexCode) {
            const wrappedLatex = '$' + latexCode + '$';
            
            if (lastFocusedEditor === 'question' && questionContentEditor) {
                questionContentEditor.insertText(wrappedLatex);
                questionContentEditor.focus();
            } else if (lastFocusedEditor === 'answer' && answerContentEditor) {
                answerContentEditor.insertText(wrappedLatex);
                answerContentEditor.focus();
            }
            
            // Update preview after insertion
            setTimeout(() => {
                if (lastFocusedEditor === 'question') {
                    updateContentPreview('question');
                } else {
                    updateContentPreview('answer');
                }
            }, 100);
        }

        function insertQuestionPart(partLetter) {
            let finalPartLetter = partLetter;
            
            // Handle custom part
            if (partLetter === 'Custom') {
                finalPartLetter = prompt('Enter custom part label (e.g., "1", "A", "iv"):', '1');
                if (!finalPartLetter) {
                    return; // User cancelled
                }
            }
            
            const questionPartHtml = `<p class="question">${finalPartLetter}) </p>`;
            
            if (lastFocusedEditor === 'question' && questionContentEditor) {
                questionContentEditor.insertHtml(questionPartHtml);
                questionContentEditor.focus();
            } else if (lastFocusedEditor === 'answer' && answerContentEditor) {
                answerContentEditor.insertHtml(questionPartHtml);
                answerContentEditor.focus();
            }
            
            // Update preview after insertion
            setTimeout(() => {
                if (lastFocusedEditor === 'question') {
                    updateContentPreview('question');
                } else {
                    updateContentPreview('answer');
                }
            }, 100);
        }

        function updateContentPreview(type) {
            const editor = type === 'question' ? questionContentEditor : answerContentEditor;
            const previewId = type === 'question' ? 'questionContentPreview' : 'answerContentPreview';
            const preview = document.getElementById(previewId);
            
            if (!editor) return;
            
            const content = editor.getData();
            
            if (content.trim() === '') {
                preview.innerHTML = type === 'question' ? 'Question content will appear here...' : 'Answer content will appear here...';
                return;
            }
            
            preview.innerHTML = content;
            
            // Re-render MathJax
            if (window.MathJax && window.MathJax.typesetPromise) {
                MathJax.typesetPromise([preview]).then(() => {
                    // MathJax rendering complete
                }).catch(function (err) {
                    console.log('MathJax error:', err.message);
                });
            }
        }

        function formatChapterName(chapter) {
            return chapter.replace(/_/g, ' ')
                         .replace(/\b\w/g, l => l.toUpperCase());
        }

        function populatePaperOptions(subject) {
            const paperSelect = document.getElementById('paperSelect');
            paperSelect.innerHTML = ''; // Clear existing options
            
            if (subject && subjectPapers[subject]) {
                subjectPapers[subject].forEach(paper => {
                    const option = document.createElement('option');
                    option.value = paper.value;
                    option.textContent = paper.label;
                    paperSelect.appendChild(option);
                });
            }
        }
        

        function fetchQuestions(subject, chapter) {
            const apiEndpoint = `/api/${subject.replace(/_/g, '-')}-questions/`;
            
            console.log('Fetching from:', `${apiEndpoint}?chapter=${chapter}`);
            
            fetch(`${apiEndpoint}?chapter=${chapter}`)
                .then(response => {
                    console.log('Response status:', response.status);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('Received data:', data);
                    const questions = data.questions || data;
                    const questionSelect = document.getElementById('questionSelect');
                    
                    if (!Array.isArray(questions)) {
                        throw new Error('Expected questions to be an array');
                    }
                    
                    questions.forEach((question, index) => {
                        const option = document.createElement('option');
                        option.value = question.id;
                        const preview = question.question.replace(/<[^>]*>/g, '').substring(0, 100) + '...';
                        option.textContent = `Q${index + 1}: ${preview}`;
                        questionSelect.appendChild(option);
                    });
                    
                    if (questions.length === 0) {
                        showMessage('No questions found for this chapter.', 'info');
                    }
                })
                .catch(error => {
                    console.error('Error fetching questions:', error);
                    showMessage(`Error fetching questions: ${error.message}`, 'danger');
                });
        }

        function loadQuestion(questionId) {
            const subject = document.getElementById('subjectSelect').value;
            const chapter = document.getElementById('chapterSelect').value;
            const apiEndpoint = `/api/${subject.replace(/_/g, '-')}-questions/`;
            
            console.log('Loading question from:', `${apiEndpoint}?chapter=${chapter}`);
            
            fetch(`${apiEndpoint}?chapter=${chapter}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('Question data received:', data);
                    const questions = data.questions || data;
                    const question = questions.find(q => q.id == questionId);
                    
                    if (question) {
                        currentQuestion = question;
                        originalMetadata = {
                            paper: question.paper,
                            difficulty: question.difficulty,
                            type: question.type,
                            marks: question.marks
                        };
                        displayQuestion(question);
                        populateEditor(question);
                        showQuestionDisplay();
                    } else {
                        showMessage('Question not found.', 'warning');
                    }
                })
                .catch(error => {
                    console.error('Error loading question:', error);
                    showMessage(`Error loading question: ${error.message}`, 'danger');
                });
        }

        function displayQuestion(question) {
            // The content is now displayed in the preview boxes and editors
            // This function is no longer needed since content is handled by CKEditor
            // and the preview is updated by the updateContentPreview function
            console.log('Question loaded for editing:', question.id);
        }

        function populateEditor(question) {
            // Ensure paper options are populated for the current subject
            const subject = document.getElementById('subjectSelect').value;
            populatePaperOptions(subject);
            
            // Show/hide correct answer field based on subject
            const correctAnswerRow = document.getElementById('correctAnswerRow');
            if (subject && (subject.includes('biology') || subject.includes('physics'))) {
                correctAnswerRow.style.display = 'block';
                document.getElementById('correctAnswerSelect').value = question.correct_answer || 'A';
            } else {
                correctAnswerRow.style.display = 'none';
            }
            
            // No special chapter selection needed (simplified for all subjects)
            
            // Set the metadata values
            document.getElementById('paperSelect').value = question.paper || (subjectPapers[subject] && subjectPapers[subject][0] ? subjectPapers[subject][0].value : 'paper1');
            document.getElementById('difficultySelect').value = question.difficulty || 'Easy';
            document.getElementById('typeSelect').value = question.type || 'registered';
            document.getElementById('marksInput').value = question.marks || '';
            
            // Populate content editors
            if (questionContentEditor) {
                questionContentEditor.setData(question.question || '');
                setTimeout(() => updateContentPreview('question'), 100);
            }
            if (answerContentEditor) {
                answerContentEditor.setData(question.answer || '');
                setTimeout(() => updateContentPreview('answer'), 100);
            }
        }

        function showQuestionDisplay() {
            document.getElementById('questionDisplayCard').style.display = 'block';
            document.getElementById('editorCard').style.display = 'block';
        }

        function hideQuestionDisplay() {
            document.getElementById('questionDisplayCard').style.display = 'none';
            document.getElementById('editorCard').style.display = 'none';
            currentQuestion = null;
            originalMetadata = null;
        }

        function saveQuestion() {
            if (!currentQuestion) {
                showMessage('No question selected.', 'warning');
                return;
            }

            const subject = document.getElementById('subjectSelect').value;
            const updatedData = {
                id: currentQuestion.id,
                paper: document.getElementById('paperSelect').value,
                difficulty: document.getElementById('difficultySelect').value,
                type: document.getElementById('typeSelect').value,
                marks: document.getElementById('marksInput').value || null,
                question: questionContentEditor ? questionContentEditor.getData() : currentQuestion.question,
                answer: answerContentEditor ? answerContentEditor.getData() : currentQuestion.answer
            };
            
            // Add correct_answer field for Biology and Physics subjects
            if (subject && (subject.includes('biology') || subject.includes('physics'))) {
                updatedData.correct_answer = document.getElementById('correctAnswerSelect').value;
            }
            
            // No special chapter handling needed (simplified)

            // Show loading state
            const saveButton = document.getElementById('saveButton');
            const originalText = saveButton.innerHTML;
            saveButton.innerHTML = '<i class="iconify" data-icon="mdi:loading" data-inline="false"></i> Saving...';
            saveButton.disabled = true;

            fetch('/api/update-question/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    subject: subject,
                    ...updatedData
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showMessage('Question updated successfully!', 'success');
                    // Update original metadata for reset functionality
                    originalMetadata = {
                        paper: updatedData.paper,
                        difficulty: updatedData.difficulty,
                        type: updatedData.type,
                        marks: updatedData.marks
                    };
                } else {
                    showMessage(data.error || 'Error updating question.', 'danger');
                }
            })
            .catch(error => {
                console.error('Error saving question:', error);
                showMessage('Error saving question. Please try again.', 'danger');
            })
            .finally(() => {
                saveButton.innerHTML = originalText;
                saveButton.disabled = false;
            });
        }

        function resetForm() {
            if (originalMetadata) {
                document.getElementById('paperSelect').value = originalMetadata.paper;
                document.getElementById('difficultySelect').value = originalMetadata.difficulty;
                document.getElementById('typeSelect').value = originalMetadata.type;
                document.getElementById('marksInput').value = originalMetadata.marks || '';
                showMessage('Form reset to original values.', 'info');
            }
        }

        function showMessage(message, type) {
            const messageDiv = document.getElementById('statusMessage');
            messageDiv.className = `alert alert-${type}`;
            messageDiv.textContent = message;
            messageDiv.style.display = 'block';
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        function deleteQuestion() {
            if (!currentQuestion) {
                showMessage('No question selected.', 'warning');
                return;
            }

            // Show confirmation modal
            const deleteModal = new bootstrap.Modal(document.getElementById('deleteConfirmModal'));
            deleteModal.show();

            // Handle confirmation
            document.getElementById('confirmDeleteButton').onclick = function() {
                // Show loading state
                const deleteButton = document.getElementById('confirmDeleteButton');
                const originalText = deleteButton.innerHTML;
                deleteButton.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Deleting...';
                deleteButton.disabled = true;

                // Send delete request
                fetch('/api/delete-question/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({
                        subject: document.getElementById('subjectSelect').value,
                        id: currentQuestion.id
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showMessage('Question deleted successfully!', 'success');
                        deleteModal.hide();
                        hideQuestionDisplay();
                        // Refresh the page to update the question list
                        setTimeout(() => {
                            window.location.reload();
                        }, 1000);
                    } else {
                        throw new Error(data.message || 'Failed to delete question');
                    }
                })
                .catch(error => {
                    console.error('Error deleting question:', error);
                    showMessage(`Error deleting question: ${error.message}`, 'danger');
                })
                .finally(() => {
                    deleteButton.innerHTML = originalText;
                    deleteButton.disabled = false;
                });
            };
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
