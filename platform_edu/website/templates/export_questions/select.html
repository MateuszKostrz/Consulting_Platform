{% load static %}
<!doctype html>
<html lang="en"
  class="layout-navbar-fixed layout-menu-fixed layout-compact"
  dir="ltr" data-skin="default" data-bs-theme="light"
  data-assets-path="../../assets/" data-template="vertical-menu-template">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"/>
  <title>Export Questions | Edunade</title>
  <link rel="icon" href="{% static 'website/images/platform_logo.svg' %}">
  {% include 'top_base.html' %}
  <style>
    .export-card { max-width: 560px; margin: 0 auto; }
    .select-box { border: 1px solid #e0e2ff; border-radius: 12px; padding: 2rem; background: #fff; box-shadow: 0 2px 12px rgba(105,108,255,.07); }
    .select-box select { border-radius: 8px; }
    .chapter-hint { font-size: .8rem; color: #aaa; margin-top: 4px; }
  </style>
</head>
<body>
<div class="layout-wrapper layout-content-navbar">
<div class="layout-container">
  {% include 'sidebar.html' %}
  <div class="content-wrapper">
  <div class="container-xxl flex-grow-1 container-p-y">
  <div class="export-card">

    <div class="mb-4">
      <h4 class="mb-1">Export Questions</h4>
      <p class="text-muted" style="font-size:.88rem;">Select a subject and chapter to generate a printable question sheet with answers and revision tags.</p>
    </div>

    <div class="select-box">
      <form id="exportForm" method="get" action="{% url 'export-questions-print' %}" target="_blank">

        <div class="mb-4">
          <label class="form-label fw-semibold">Subject</label>
          <select class="form-select" name="subject" id="subjectSelect" required>
            <option value="">— Choose subject —</option>
            {% for key, label in subjects %}
            <option value="{{ key }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Chapter</label>
          <select class="form-select" name="chapter" id="chapterSelect" required disabled>
            <option value="">— Choose chapter —</option>
          </select>
          <div class="chapter-hint" id="chapterHint">Select a subject first</div>
        </div>

        <button type="submit" class="btn btn-primary w-100" id="exportBtn" disabled>
          <i class="ri-file-download-line me-2"></i>Preview &amp; Export PDF
        </button>
      </form>
    </div>

  </div>
  </div>
  </div>
</div>
</div>

<!-- Chapter data -->
<script>
const CHAPTER_MAP = {
  {% for key, chapters in chapter_map.items %}
  "{{ key }}": [{% for v, d in chapters %}["{{ v }}", "{{ d }}"]{% if not forloop.last %},{% endif %}{% endfor %}]{% if not forloop.last %},{% endif %}
  {% endfor %}
};
</script>

<script src="{% static 'website/js/vendor/libs/jquery/jquery.js' %}"></script>
<script src="{% static 'website/js/vendor/libs/popper/popper.js' %}"></script>
<script src="{% static 'website/js/bootstrap.js' %}"></script>
<script src="{% static 'website/js/vendor/libs/perfect-scrollbar/perfect-scrollbar.js' %}"></script>
<script src="{% static 'website/js/vendor/menu.js' %}"></script>
<script src="{% static 'website/js/main.js' %}"></script>
<script src="{% static 'website/js/vendors.min.js' %}"></script>
<script>
const subjectSelect  = document.getElementById('subjectSelect');
const chapterSelect  = document.getElementById('chapterSelect');
const chapterHint    = document.getElementById('chapterHint');
const exportBtn      = document.getElementById('exportBtn');

subjectSelect.addEventListener('change', function() {
  const key = this.value;
  chapterSelect.innerHTML = '<option value="">— Choose chapter —</option>';
  chapterSelect.disabled = true;
  exportBtn.disabled = true;
  chapterHint.textContent = 'Select a subject first';

  if (!key || !CHAPTER_MAP[key]) return;

  CHAPTER_MAP[key].forEach(([val, label]) => {
    const opt = document.createElement('option');
    opt.value = val;
    opt.textContent = label;
    chapterSelect.appendChild(opt);
  });
  chapterSelect.disabled = false;
  chapterHint.textContent = CHAPTER_MAP[key].length + ' chapters available';
});

chapterSelect.addEventListener('change', function() {
  exportBtn.disabled = !this.value;
});
</script>
</body>
</html>
