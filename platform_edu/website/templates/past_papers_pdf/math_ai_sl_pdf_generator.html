<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math PDF Generator</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      }

      .container {
        max-width: 600px;
      }

      .card {
        border-radius: 1rem;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        border: none;
        backdrop-filter: blur(10px);
        background: rgba(255, 255, 255, 0.95);
      }

      .card-body {
        padding: 3rem;
      }

      h1 {
        color: #333;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }

      .subtitle {
        color: #666;
        margin-bottom: 2rem;
      }

      .form-label {
        color: #333;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }

      .form-select {
        padding: 0.75rem;
        border-radius: 0.5rem;
        border: 2px solid #e0e0e0;
        font-size: 1rem;
        transition: all 0.3s ease;
      }

      .form-select:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        outline: none;
      }

      .btn-generate {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        padding: 0.875rem 2.5rem;
        font-size: 1.1rem;
        font-weight: 600;
        border-radius: 0.5rem;
        color: white;
        transition: all 0.3s ease;
        width: 100%;
        margin-top: 1.5rem;
      }

      .btn-generate:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
      }

      .btn-generate:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .spinner-border {
        display: none;
        width: 1.2rem;
        height: 1.2rem;
        margin-left: 0.5rem;
        vertical-align: middle;
      }

      .spinner-border.show {
        display: inline-block;
      }

      .alert {
        border-radius: 0.5rem;
        margin-top: 1.5rem;
        border: none;
      }

      .info-box {
        background: #e8f4fd;
        border-left: 4px solid #2196F3;
        padding: 1rem;
        border-radius: 0.5rem;
        margin-top: 1rem;
        font-size: 0.9rem;
        color: #333;
      }

      .info-box strong {
        color: #1976D2;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="card-body">
          <!-- Header -->
          <div class="text-center">
            <h1>Math PDF Generator</h1>
            <p class="subtitle">Generate PDFs of past paper questions by subject and chapter</p>
          </div>

          <!-- Subject Selection -->
          <div class="mb-3">
            <label for="subjectSelect" class="form-label">Select Subject</label>
            <select class="form-select" id="subjectSelect">
              <option value="" selected disabled>Choose a subject...</option>
              <option value="ai_sl">Math AI SL</option>
              <option value="ai_hl">Math AI HL</option>
              <option value="aa_sl">Math AA SL</option>
              <option value="aa_hl">Math AA HL</option>
            </select>
          </div>

          <!-- Paper Selection -->
          <div class="mb-3">
            <label for="paperSelect" class="form-label">Select Paper</label>
            <select class="form-select" id="paperSelect" disabled>
              <option value="" selected disabled>Choose a paper...</option>
              <option value="all">All Papers</option>
              <option value="1">Paper 1</option>
              <option value="2">Paper 2</option>
            </select>
          </div>

          <!-- Chapter Selection -->
          <div class="mb-3">
            <label for="chapterSelect" class="form-label">Select Chapter</label>
            <select class="form-select" id="chapterSelect" disabled>
              <option value="" selected disabled>Choose a chapter...</option>
            </select>
          </div>

          <!-- Instructions -->
          <div class="info-box">
            <strong>How it works:</strong> Select a subject, paper, and chapter above, then click "Generate PDF" to create a document containing all past paper question screenshots for that combination. Each question will appear on its own page.
          </div>

          <!-- Generate Button -->
          <button 
            id="generateBtn" 
            class="btn btn-generate"
            onclick="generatePDF()"
            disabled>
            📄 Generate PDF
            <span class="spinner-border spinner-border-sm" role="status" id="loadingSpinner"></span>
          </button>

          <!-- Status Messages -->
          <div id="statusMessage"></div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // Chapter options for each subject
      const subjectChapters = {
        'ai_sl': [
          ['number_skills', 'Number Skills'],
          ['seq_series', 'Sequences & Series'],
          ['systems_of_equations', 'Systems of Linear Equations'],
          ['linear_equations_graphs', 'Linear Equations & Graphs'],
          ['application_of_functions', 'Application of Functions'],
          ['properties_of_functions', 'Properties of Functions'],
          ['function_transformations', 'Function Transformations'],
          ['trigonometry', 'Trigonometry'],
          ['voronoi_diagrams', 'Voronoi Diagrams'],
          ['descriptive_statistics', 'Descriptive Statistics'],
          ['bivariate_statistics', 'Bivariate Statistics'],
          ['probability', 'Probability'],
          ['distributions', 'Distributions'],
          ['geometry_shapes', 'Geometry of 3D Shapes'],
          ['hypothesis_testing', 'Hypothesis Testing'],
          ['differentiation', 'Differentiation'],
          ['integration', 'Integration']
        ],
        'ai_hl': [
          ['number_skills', 'Number Skills'],
          ['seq_series', 'Sequences & Series'],
          ['complex_numbers', 'Complex Numbers'],
          ['matrices', 'Matrices'],
          ['systems_of_equations', 'Systems of Linear Equations'],
          ['linear_equations_graphs', 'Linear Equations & Graphs'],
          ['application_of_functions', 'Application of Functions'],
          ['properties_of_functions', 'Properties of Functions'],
          ['function_transformations', 'Function Transformations'],
          ['trigonometry', 'Trigonometry'],
          ['trigonometric_functions', 'Trigonometric Functions'],
          ['gemoetric_transformations', 'Geometric Transformations'],
          ['voronoi_diagrams', 'Voronoi Diagrams'],
          ['vectors', 'Vectors'],
          ['graph_theory', 'Graph Theory'],
          ['descriptive_statistics', 'Descriptive Statistics'],
          ['bivariate_statistics', 'Bivariate Statistics'],
          ['probability', 'Probability'],
          ['distributions', 'Distributions'],
          ['geometry_shapes', 'Geometry of 3D Shapes'],
          ['hypothesis_testing', 'Hypothesis Testing'],
          ['confidence_intervals', 'Estimations & Confidence Intervals'],
          ['differentiation', 'Differentiation'],
          ['integration', 'Integration']
        ],
        'aa_sl': [
          ['seq_series', 'Sequences & Series'],
          ['exp_and_logs', 'Exponentials and Logarithms'],
          ['binomial_expansion', 'Binomial Expansion'],
          ['proofs', 'Proofs'],
          ['properties_of_functions', 'Properties of Functions'],
          ['quadratic_functions', 'Quadratic Functions'],
          ['rational_functions', 'Rational Functions'],
          ['exp_and_logs_functions', 'Exponential and Logarithmic Functions'],
          ['function_transformations', 'Function Transformations'],
          ['geometry', 'Geometry'],
          ['trig_functions', 'Trigonometric Functions'],
          ['statistics', 'Statistics'],
          ['bivariate_stats', 'Bivariate Statistics'],
          ['probability', 'Probability'],
          ['distributions', 'Distributions'],
          ['integral_calculus', 'Integral Calculus'],
          ['differential_calculus', 'Differential Calculus'],
          ['kinematics', 'Kinematics']
        ],
        'aa_hl': [
          ['seq_series', 'Sequences & Series'],
          ['exp_and_logs', 'Exponentials and Logarithms'],
          ['binomial_expansion', 'Binomial Expansion'],
          ['proofs', 'Proofs'],
          ['counting_principles', 'Counting Principles'],
          ['complex_numbers', 'Complex Numbers'],
          ['systems_of_equations', 'Systems of Equations'],
          ['properties_of_functions', 'Properties of Functions'],
          ['quadratic_functions', 'Quadratic Functions'],
          ['rational_functions', 'Rational Functions'],
          ['exp_and_logs_functions', 'Exponential and Logarithmic Functions'],
          ['function_transformations', 'Function Transformations'],
          ['polynomials', 'Polynomials'],
          ['mod_inequalities', 'Mod & Inequalities'],
          ['geometry', 'Geometry'],
          ['trig_functions', 'Trigonometric Functions'],
          ['vectors', 'Vectors'],
          ['statistics', 'Statistics'],
          ['bivariate_stats', 'Bivariate Statistics'],
          ['probability', 'Probability'],
          ['distributions', 'Distributions'],
          ['integral_calculus', 'Integral Calculus'],
          ['differential_calculus', 'Differential Calculus']
        ]
      };

      // Subject selection handler
      document.getElementById('subjectSelect').addEventListener('change', function() {
        const subject = this.value;
        const paperSelect = document.getElementById('paperSelect');
        const chapterSelect = document.getElementById('chapterSelect');
        const generateBtn = document.getElementById('generateBtn');

        if (subject) {
          // Enable paper select
          paperSelect.disabled = false;
          
          // Populate chapters
          chapterSelect.innerHTML = '<option value="" selected disabled>Choose a chapter...</option>';
          const chapters = subjectChapters[subject] || [];
          chapters.forEach(([code, name]) => {
            const option = document.createElement('option');
            option.value = code;
            option.textContent = name;
            chapterSelect.appendChild(option);
          });
          
          // Enable chapter select if it wasn't already
          chapterSelect.disabled = false;
        } else {
          paperSelect.disabled = true;
          chapterSelect.disabled = true;
          generateBtn.disabled = true;
        }
        
        // Reset and disable generate button
        generateBtn.disabled = true;
      });

      // Paper selection handler
      document.getElementById('paperSelect').addEventListener('change', function() {
        checkFormComplete();
      });

      // Chapter selection handler
      document.getElementById('chapterSelect').addEventListener('change', function() {
        checkFormComplete();
      });

      // Check if all selections are made
      function checkFormComplete() {
        const subject = document.getElementById('subjectSelect').value;
        const paper = document.getElementById('paperSelect').value;
        const chapter = document.getElementById('chapterSelect').value;
        const generateBtn = document.getElementById('generateBtn');
        
        generateBtn.disabled = !(subject && paper && chapter);
      }

      // Generate PDF function
      async function generatePDF() {
        const subjectSelect = document.getElementById('subjectSelect');
        const paperSelect = document.getElementById('paperSelect');
        const chapterSelect = document.getElementById('chapterSelect');
        
        const subject = subjectSelect.value;
        const subjectName = subjectSelect.options[subjectSelect.selectedIndex].text;
        const paper = paperSelect.value;
        const paperName = paperSelect.options[paperSelect.selectedIndex].text;
        const chapter = chapterSelect.value;
        const chapterName = chapterSelect.options[chapterSelect.selectedIndex].text;
        
        if (!subject || !paper || !chapter) {
          showMessage('Please select subject, paper, and chapter', 'warning');
          return;
        }

        const generateBtn = document.getElementById('generateBtn');
        const spinner = document.getElementById('loadingSpinner');
        const statusMessage = document.getElementById('statusMessage');

        // Disable button and show loading
        generateBtn.disabled = true;
        spinner.classList.add('show');
        statusMessage.innerHTML = '';

        try {
          showMessage(`Generating PDF for ${subjectName} - ${paperName} - ${chapterName}...`, 'info');

          const response = await fetch('/past-papers/math-ai-sl/generate-pdf/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({ 
              subject: subject,
              paper: paper,
              chapter: chapter 
            })
          });

          if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || 'Failed to generate PDF');
          }

          // Get the PDF blob
          const blob = await response.blob();
          
          // Create a download link
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          const filename = `${subjectName.replace(/\s+/g, '_')}_${paperName.replace(/\s+/g, '_')}_${chapterName.replace(/\s+/g, '_')}_Questions.pdf`;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          window.URL.revokeObjectURL(url);
          document.body.removeChild(a);

          showMessage(`PDF generated successfully! Download should start automatically.`, 'success');
          
          // Re-enable button after 2 seconds
          setTimeout(() => {
            generateBtn.disabled = false;
          }, 2000);
        } catch (error) {
          console.error('Error generating PDF:', error);
          showMessage(`Error: ${error.message}`, 'danger');
          generateBtn.disabled = false;
        } finally {
          // Hide loading spinner
          spinner.classList.remove('show');
        }
      }

      // Helper function to show messages
      function showMessage(message, type) {
        const statusMessage = document.getElementById('statusMessage');
        statusMessage.innerHTML = `
          <div class="alert alert-${type} alert-dismissible fade show" role="alert">
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        `;
      }

      // Helper function to get CSRF token
      function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
          const cookies = document.cookie.split(';');
          for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
              cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
              break;
            }
          }
        }
        return cookieValue;
      }
    </script>
  </body>
</html>
