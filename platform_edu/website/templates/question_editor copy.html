<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Editor - Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/iconify@3.1.1/dist/iconify.min.css" rel="stylesheet">
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
</head>
<body>
    <div class="container-fluid py-4">
        <div class="row">
            <div class="col-12">
                <h1 class="mb-4">Question Editor</h1>
                
                <!-- Selection Controls -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0">Select Question</h5>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label for="subjectSelect" class="form-label">Subject</label>
                                <select class="form-select" id="subjectSelect">
                                    <option value="">Select Subject</option>
                                    <option value="math_ai_hl">Math AI HL</option>
                                    <option value="math_ai_sl">Math AI SL</option>
                                    <option value="math_aa_hl">Math AA HL</option>
                                    <option value="math_aa_hl_backup">Math AA HL (Backup)</option>
                                    <option value="math_aa_sl">Math AA SL</option>
                                    <option value="biology_hl">Biology HL</option>
                                    <option value="biology_sl">Biology SL</option>
                                    <option value="physics_hl">Physics HL</option>
                                    <option value="physics_sl">Physics SL</option>
                                    <option value="comp_sci_hl">Computer Science HL</option>
                                    <option value="comp_sci_sl">Computer Science SL</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="chapterSelect" class="form-label">Chapter</label>
                                <select class="form-select" id="chapterSelect" disabled>
                                    <option value="">Select Chapter</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="questionSelect" class="form-label">Question</label>
                                <select class="form-select" id="questionSelect" disabled>
                                    <option value="">Select Question</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Question Display -->
                <div class="card mb-4" id="questionDisplayCard" style="display: none;">
                    <div class="card-header">
                        <h5 class="mb-0">Question Content</h5>
                    </div>
                    <div class="card-body">
                        <div id="questionContent" class="border p-3 mb-3" style="min-height: 200px; background-color: #f8f9fa;">
                            <!-- Question content will be displayed here -->
                        </div>
                        <div id="answerContent" class="border p-3" style="min-height: 100px; background-color: #e9ecef;">
                            <strong>Answer:</strong>
                            <div id="answerText"></div>
                        </div>
                    </div>
                </div>

                <!-- Question Metadata Editor -->
                <div class="card mb-4" id="editorCard" style="display: none;">
                    <div class="card-header">
                        <h5 class="mb-0">Edit Question Metadata</h5>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                                                         <div class="col-md-3">
                                 <label for="paperSelect" class="form-label">Paper</label>
                                 <select class="form-select" id="paperSelect">
                                     <!-- Paper options will be populated dynamically -->
                                 </select>
                             </div>
                            <div class="col-md-3">
                                <label for="difficultySelect" class="form-label">Difficulty</label>
                                <select class="form-select" id="difficultySelect">
                                    <option value="Easy">Easy</option>
                                    <option value="Medium">Medium</option>
                                    <option value="Hard">Hard</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="typeSelect" class="form-label">Access Type</label>
                                <select class="form-select" id="typeSelect">
                                    <option value="free">Free</option>
                                    <option value="registered">Registered</option>
                                    <option value="premium">Premium</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="marksInput" class="form-label">Marks</label>
                                <input type="number" class="form-control" id="marksInput" min="1" max="50">
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-12">
                                <button class="btn btn-primary" id="saveButton" onclick="saveQuestion()">
                                    <i class="iconify" data-icon="mdi:content-save"></i> Save Changes
                                </button>
                                <button class="btn btn-secondary ms-2" id="resetButton" onclick="resetForm()">
                                    <i class="iconify" data-icon="mdi:refresh"></i> Reset
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Status Messages -->
                <div id="statusMessage" class="alert" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentQuestion = null;
        let originalMetadata = null;

                 // Subject to model mapping

         // Paper choices for different subjects

                 {value: 'paper3', label: 'Paper 3'}
             ],
             'math_ai_sl': [
                 {value: 'paper1', label: 'Paper 1'},
                 {value: 'paper2', label: 'Paper 2'},
                 {value: 'paper3', label: 'Paper 3'}
             ],
             'math_aa_hl': [
                 {value: 'paper1', label: 'Paper 1'},
                 {value: 'paper2', label: 'Paper 2'},
                 {value: 'paper3', label: 'Paper 3'}
             ],
             'math_aa_hl_backup': [
                 {value: 'paper1', label: 'Paper 1'},
                 {value: 'paper2', label: 'Paper 2'},
                 {value: 'paper3', label: 'Paper 3'}
             ],
             'math_aa_sl': [
                 {value: 'paper1', label: 'Paper 1'},
                 {value: 'paper2', label: 'Paper 2'},
                 {value: 'paper3', label: 'Paper 3'}
             ],
             'biology_hl': [
                 {value: 'paper1A', label: 'Paper 1A'},
                 {value: 'paper1B', label: 'Paper 1B'},
                 {value: 'paper2', label: 'Paper 2'}
             ],
             'biology_sl': [
                 {value: 'paper1A', label: 'Paper 1A'},
                 {value: 'paper1B', label: 'Paper 1B'},
                 {value: 'paper2', label: 'Paper 2'}
             ],
             'physics_hl': [
                 {value: 'paper1', label: 'Paper 1'},
                 {value: 'paper2', label: 'Paper 2'}
             ],
             'physics_sl': [
                 {value: 'paper1', label: 'Paper 1'},
                 {value: 'paper2', label: 'Paper 2'}
             ],
             'comp_sci_hl': [
                 {value: 'paper1', label: 'Paper 1'},
                 {value: 'paper2', label: 'Paper 2'},
                 {value: 'paper3', label: 'Paper 3'}
             ],
             'comp_sci_sl': [
                 {value: 'paper1', label: 'Paper 1'},
                 {value: 'paper2', label: 'Paper 2'},
                 {value: 'paper3', label: 'Paper 3'}
             ]
         };

        // Chapter mappings for each subject
        const subjectChapters = {
                         'math_ai_hl': ['number_skills', 'seq_series', 'complex_numbers', 'matrices', 'systems_lin_eq', 'lin_eq_graphs', 'applications_of_functions', 'properties_of_functions', 'function_transformations', 'geometry_shapes', 'trigonometry', 'trigonometric_functions', 'geometric_transformations', 'voronoi_diagrams', 'graph_theory', 'vectors', 'descriptive_stats', 'bivariate_statistics', 'hypothesis_testing', 'probability', 'estimations_and_confidence_intervals', 'distributions', 'integration', 'differentiation', 'kinematics', 'differential_equations'],
                         'math_ai_sl': ['number_skills', 'seq_series', 'systems_lin_eq', 'lin_eq_graphs', 'hypothesis_testing', 'trigonometry', 'applications_of_functions', 'voronoi_diagrams', 'probability', 'properties_of_functions', 'integration', 'distributions', 'geometry_shapes', 'descriptive_stats', 'differentiation', 'bivariate_statistics'],
                         'math_aa_hl': ['seq_series', 'exp_and_logs', 'binomial_expansion', 'proofs', 'counting_principles', 'complex_numbers', 'systems_of_equations', 'properties_of_functions', 'quadratic_functions', 'rational_functions', 'exp_and_logs_functions', 'function_transformations', 'polynomials', 'mod_inequalities', 'geometry', 'trig_functions', 'vectors', 'statistics', 'bivariate_stats', 'probability', 'distributions', 'integral_calculus', 'differential_calculus', 'kinematics', 'maclaurin_series', 'differential_equations'],
                         'math_aa_hl_backup': ['seq_series', 'exp_and_logs', 'binomial_expansion', 'proofs', 'counting_principles', 'complex_numbers', 'systems_of_equations', 'properties_of_functions', 'quadratic_functions', 'rational_functions', 'exp_and_logs_functions', 'function_transformations', 'polynomials', 'mod_inequalities', 'geometry', 'trig_functions', 'vectors', 'statistics', 'bivariate_stats', 'probability', 'distributions', 'integral_calculus', 'differential_calculus', 'kinematics', 'maclaurin_series', 'differential_equations'],
                         'math_aa_sl': ['seq_series', 'exp_and_logs', 'binomial_expansion', 'proofs', 'properties_of_functions', 'quadratic_functions', 'rational_functions', 'exp_and_logs_functions', 'function_transformations', 'geometry', 'trigonometric_functions', 'statistics', 'bivariate_stats', 'probability', 'distributions', 'integration', 'differentiation', 'kinematics'],
            'biology_hl': ['water', 'nucleic_acids', 'origin_of_cells', 'viruses', 'classification', 'muscle_and_motility', 'chemical_signaling', 'cell_structure', 'diversity_of_organisms', 'evolution_and_speciation', 'conservation_of_biodiversity', 'carbohydrates_and_lipids', 'proteins', 'membranes_transport', 'organelles_compartment', 'cell_specialization', 'gas_exchange', 'transport', 'adaptation_to_environment', 'ecological_niches', 'enzymes_metabolism', 'cell_respiration', 'photosynthesis', 'neural_signaling', 'integration_of_body_systems', 'defence_against_disease', 'population_communities', 'transfer_energy_matter', 'dna_replication', 'protein_synthesis', 'mutations_editing', 'natural_selection', 'inheritance', 'climate_change', 'water_potential', 'cell_division', 'reproduction', 'stability_change', 'homeostasis', 'gene_expression'],
                         'biology_sl': ['water', 'cell_structure', 'nucleic_acids', 'diversity_of_organisms', 'evolution_and_speciation', 'conservation_of_biodiversity', 'carbohydrates_and_lipids', 'proteins', 'membranes_transport', 'organelles_compartment', 'cell_specialization', 'gas_exchange', 'transport', 'adaptation_to_environment', 'ecological_niches', 'enzymes_metabolism', 'cell_respiration', 'photosynthesis', 'neural_signaling', 'integration_of_body_systems', 'defence_against_disease', 'population_communities', 'transfer_energy_matter', 'dna_replication', 'protein_synthesis', 'mutations_editing', 'natural_selection', 'inheritance', 'climate_change', 'water_potential', 'cell_division', 'reproduction', 'stability_change', 'homeostasis'],
             'physics_hl': ['kinematics', 'forces_and_momentum', 'work_energy_power', 'rigid_body_mechanics', 'galilean_and_special_relativity', 'thermal_energy', 'greenhouse_effect', 'ideal_gas_model', 'thermodynamics', 'electric_circuits', 'simple_harmonic_motion', 'wave_model', 'wave_phenomena', 'standing_waves', 'doppler_effect', 'gravitational_fields', 'electric_magnetic_fields', 'motion_in_fields', 'induction', 'structure_atom', 'quantum_physics', 'radioactive_decay', 'fission', 'fusion_and_stars'],
             'physics_sl': ['kinematics', 'forces_and_momentum', 'work_energy_power', 'thermal_energy', 'greenhouse_effect', 'ideal_gas_model', 'electric_circuits', 'simple_harmonic_motion', 'wave_model', 'wave_phenomena', 'standing_waves', 'doppler_effect', 'gravitational_fields', 'electric_magnetic_fields', 'motion_in_fields', 'structure_atom', 'radioactive_decay', 'fission', 'fusion_and_stars'],
             'comp_sci_hl': ['system_fundamentals', 'computer_organisation', 'networks', 'computational_thinking', 'resource_management', 'abstract_data_structures', 'variables_input', 'if_statements', 'loops', 'arrays', 'methods', 'constructors'],
             'comp_sci_sl': ['system_fundamentals', 'computer_organisation', 'networks', 'computational_thinking', 'variables_input', 'if_statements', 'loops', 'arrays', 'methods', 'constructors']
        };

        // Event listeners
        document.getElementById('subjectSelect').addEventListener('change', function() {
            const subject = this.value;
            const chapterSelect = document.getElementById('chapterSelect');
            const questionSelect = document.getElementById('questionSelect');
            
            // Reset dependent dropdowns
            chapterSelect.innerHTML = '<option value="">Select Chapter</option>';
            questionSelect.innerHTML = '<option value="">Select Question</option>';
            chapterSelect.disabled = !subject;
            questionSelect.disabled = true;
            hideQuestionDisplay();
            
            // Populate paper options for the selected subject
            populatePaperOptions(subject);
            
            if (subject && subjectChapters[subject]) {
                subjectChapters[subject].forEach(chapter => {
                    const option = document.createElement('option');
                    option.value = chapter;
                    option.textContent = formatChapterName(chapter);
                    chapterSelect.appendChild(option);
                });
            }
        });

        document.getElementById('chapterSelect').addEventListener('change', function() {
            const subject = document.getElementById('subjectSelect').value;
            const chapter = this.value;
            const questionSelect = document.getElementById('questionSelect');
            
            questionSelect.innerHTML = '<option value="">Select Question</option>';
            questionSelect.disabled = !chapter;
            hideQuestionDisplay();
            
            if (subject && chapter) {
                fetchQuestions(subject, chapter);
            }
        });

        document.getElementById('questionSelect').addEventListener('change', function() {
            const questionId = this.value;
            if (questionId) {
                loadQuestion(questionId);
            } else {
                hideQuestionDisplay();
            }
        });

        function formatChapterName(chapter) {
            return chapter.replace(/_/g, ' ')
                         .replace(/\b\w/g, l => l.toUpperCase());
        }

        function populatePaperOptions(subject) {
            const paperSelect = document.getElementById('paperSelect');
            paperSelect.innerHTML = ''; // Clear existing options
            
            if (subject && subjectPapers[subject]) {
                subjectPapers[subject].forEach(paper => {
                    const option = document.createElement('option');
                    option.value = paper.value;
                    option.textContent = paper.label;
                    paperSelect.appendChild(option);
                });
            }
        }

        function fetchQuestions(subject, chapter) {
            const apiEndpoint = `/api/${subject.replace(/_/g, '-')}-questions/`;
            
            console.log('Fetching from:', `${apiEndpoint}?chapter=${chapter}`);
            
            fetch(`${apiEndpoint}?chapter=${chapter}`)
                .then(response => {
                    console.log('Response status:', response.status);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('Received data:', data);
                    const questions = data.questions || data;
                    const questionSelect = document.getElementById('questionSelect');
                    
                    if (!Array.isArray(questions)) {
                        throw new Error('Expected questions to be an array');
                    }
                    
                    questions.forEach((question, index) => {
                        const option = document.createElement('option');
                        option.value = question.id;
                        const preview = question.question.replace(/<[^>]*>/g, '').substring(0, 100) + '...';
                        option.textContent = `Q${index + 1}: ${preview}`;
                        questionSelect.appendChild(option);
                    });
                    
                    if (questions.length === 0) {
                        showMessage('No questions found for this chapter.', 'info');
                    }
                })
                .catch(error => {
                    console.error('Error fetching questions:', error);
                    showMessage(`Error fetching questions: ${error.message}`, 'danger');
                });
        }

        function loadQuestion(questionId) {
            const subject = document.getElementById('subjectSelect').value;
            const chapter = document.getElementById('chapterSelect').value;
            const apiEndpoint = `/api/${subject.replace(/_/g, '-')}-questions/`;
            
            console.log('Loading question from:', `${apiEndpoint}?chapter=${chapter}`);
            
            fetch(`${apiEndpoint}?chapter=${chapter}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('Question data received:', data);
                    const questions = data.questions || data;
                    const question = questions.find(q => q.id == questionId);
                    
                    if (question) {
                        currentQuestion = question;
                        originalMetadata = {
                            paper: question.paper,
                            difficulty: question.difficulty,
                            type: question.type,
                            marks: question.marks
                        };
                        displayQuestion(question);
                        populateEditor(question);
                        showQuestionDisplay();
                    } else {
                        showMessage('Question not found.', 'warning');
                    }
                })
                .catch(error => {
                    console.error('Error loading question:', error);
                    showMessage(`Error loading question: ${error.message}`, 'danger');
                });
        }

        function displayQuestion(question) {
            document.getElementById('questionContent').innerHTML = question.question;
            document.getElementById('answerText').innerHTML = question.answer || 'No answer available';
            
            // Render MathJax
            if (window.MathJax) {
                MathJax.typesetPromise([document.getElementById('questionContent'), document.getElementById('answerText')])
                    .catch((err) => console.log(err.message));
            }
        }

        function populateEditor(question) {
            // Ensure paper options are populated for the current subject
            const subject = document.getElementById('subjectSelect').value;
            populatePaperOptions(subject);
            
            // Set the values
            document.getElementById('paperSelect').value = question.paper || (subjectPapers[subject] && subjectPapers[subject][0] ? subjectPapers[subject][0].value : 'paper1');
            document.getElementById('difficultySelect').value = question.difficulty || 'Easy';
            document.getElementById('typeSelect').value = question.type || 'registered';
            document.getElementById('marksInput').value = question.marks || '';
        }

        function showQuestionDisplay() {
            document.getElementById('questionDisplayCard').style.display = 'block';
            document.getElementById('editorCard').style.display = 'block';
        }

        function hideQuestionDisplay() {
            document.getElementById('questionDisplayCard').style.display = 'none';
            document.getElementById('editorCard').style.display = 'none';
            currentQuestion = null;
            originalMetadata = null;
        }

        function saveQuestion() {
            if (!currentQuestion) {
                showMessage('No question selected.', 'warning');
                return;
            }

            const subject = document.getElementById('subjectSelect').value;
            const updatedData = {
                id: currentQuestion.id,
                paper: document.getElementById('paperSelect').value,
                difficulty: document.getElementById('difficultySelect').value,
                type: document.getElementById('typeSelect').value,
                marks: document.getElementById('marksInput').value || null
            };

            // Show loading state
            const saveButton = document.getElementById('saveButton');
            const originalText = saveButton.innerHTML;
            saveButton.innerHTML = '<i class="iconify" data-icon="mdi:loading" data-inline="false"></i> Saving...';
            saveButton.disabled = true;

            fetch('/api/update-question/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    subject: subject,
                    ...updatedData
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showMessage('Question updated successfully!', 'success');
                    // Update original metadata for reset functionality
                    originalMetadata = {
                        paper: updatedData.paper,
                        difficulty: updatedData.difficulty,
                        type: updatedData.type,
                        marks: updatedData.marks
                    };
                } else {
                    showMessage(data.error || 'Error updating question.', 'danger');
                }
            })
            .catch(error => {
                console.error('Error saving question:', error);
                showMessage('Error saving question. Please try again.', 'danger');
            })
            .finally(() => {
                saveButton.innerHTML = originalText;
                saveButton.disabled = false;
            });
        }

        function resetForm() {
            if (originalMetadata) {
                document.getElementById('paperSelect').value = originalMetadata.paper;
                document.getElementById('difficultySelect').value = originalMetadata.difficulty;
                document.getElementById('typeSelect').value = originalMetadata.type;
                document.getElementById('marksInput').value = originalMetadata.marks || '';
                showMessage('Form reset to original values.', 'info');
            }
        }

        function showMessage(message, type) {
            const messageDiv = document.getElementById('statusMessage');
            messageDiv.className = `alert alert-${type}`;
            messageDiv.textContent = message;
            messageDiv.style.display = 'block';
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
