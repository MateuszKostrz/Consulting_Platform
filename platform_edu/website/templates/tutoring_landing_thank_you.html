{% load static %}
<!doctype html>
<html lang="en">
<head>
    <title>Thank you | {{ site_name }}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="icon" href="{% static 'website/images/platform_logo.svg' %}">

    {% include 'includes/meta_pixel.html' %}
    <script>
    /* Fire Lead conversion after survey submit */
    if (typeof fbq === 'function') {
        fbq('track', 'Lead');
    }
    </script>

    <link rel="stylesheet" href="{% static 'website/css/landing/vendors.min.css' %}" />
    <link rel="stylesheet" href="{% static 'website/css/landing/style.css' %}" />
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #f8f9ff 0%, #fff 100%);
            font-family: inherit;
        }
        .ty-card {
            max-width: 520px;
            text-align: center;
            padding: 48px 36px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,.08);
            border: 1px solid #eaecf0;
        }
        .ty-icon {
            width: 64px; height: 64px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 20px;
        }
        .ty-card h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 12px; }
        .ty-card p { color: #555; font-size: 1rem; line-height: 1.6; }
    </style>

    <!-- Google Tag Manager -->
<script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-N8R9KT6T');</script>
    <!-- End Google Tag Manager -->

</head>
<body>

                <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-N8R9KT6T"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
     
    <div class="ty-card">
        <div class="ty-icon">&#10003;</div>
        <h1>Thank you{% if first_name %}, {{ first_name }}{% endif %}!</h1>
        <p>We've received your survey. A member of our team will contact you within 24 hours to schedule your free intro call.</p>
        <a href="{% url 'landing' %}" class="btn btn-rounded btn-dark-gray btn-box-shadow mt-4">Back to homepage</a>
    </div>
</body>
</html>
