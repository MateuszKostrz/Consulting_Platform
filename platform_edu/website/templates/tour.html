{% load static %}


<!doctype html>

<html
  lang="en"
  class="layout-navbar-fixed layout-menu-fixed layout-compact"
  dir="ltr"
  data-skin="default"
  data-bs-theme="light"
  data-assets-path="../../assets/"
  data-template="vertical-menu-template">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Tour | {{ site_name }}</title>

    <meta name="description" content="" />

    {% include 'top_base.html' %}
    <!-- endbuild -->

    <link rel="stylesheet" href="{% static 'website/css/vendor/libs/shepherd/shepherd.css' %}" />

    <!-- Page CSS -->

    <!-- Helpers -->
    <script type="text/javascript" src="{% static 'website/js/vendor/helpers.js' %}"></script>

    <!--? Template customizer: To hide customizer set displayCustomizer value false in config.js. -->
    <!-- <script type="text/javascript" src="{% static 'website/js/vendor/template-customizer.js' %}"></script> -->

    <!--? Config: Mandatory theme config file contain global vars & default theme options, Set your preferred theme option in this file. -->

    <script type="text/javascript" src="{% static 'website/js/vendor/config.js' %}"></script>
  </head>

  <body>
    <!-- Layout wrapper -->
    <div class="layout-wrapper layout-content-navbar">
      <div class="layout-container">
        <!-- Menu -->

        {% include 'sidebar.html' %}

          <!-- / Navbar -->

          <!-- Content wrapper -->
          <div class="content-wrapper">
            <!-- Content -->
            <div class="container-xxl flex-grow-1 container-p-y">
              <div class="row">
                <div class="col-12">
                  <div class="card tour-card">
                    <h5 class="card-header">Tour</h5>
                    <div class="card-body">
                      <button class="btn btn-primary" id="shepherd-example">Start tour</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <!-- / Content -->

            <!-- Footer -->
            <footer class="content-footer footer bg-footer-theme">
              <div class="container-xxl">
                <div
                  class="footer-container d-flex align-items-center justify-content-between py-4 flex-md-row flex-column">
                  <div class="mb-2 mb-md-0">
                    &#169;
                    <script>
                      document.write(new Date().getFullYear());
                    </script>
                    , made with ❤️ by
                    <a href="https://pixinvent.com" target="_blank" class="footer-link fw-medium">Pixinvent</a>
                  </div>
                  <div class="d-none d-lg-inline-block">
                    <a href="https://themeforest.net/licenses/standard" class="footer-link me-4" target="_blank"
                      >License</a
                    >

                    <a href="https://themeforest.net/user/pixinvent/portfolio" target="_blank" class="footer-link me-4"
                      >More Themes</a
                    >
                    <a
                      href="https://demos.pixinvent.com/materialize-html-admin-template/documentation/"
                      target="_blank"
                      class="footer-link me-4"
                      >Documentation</a
                    >

                    <a href="https://pixinvent.ticksy.com/" target="_blank" class="footer-link d-none d-sm-inline-block"
                      >Support</a
                    >
                  </div>
                </div>
              </div>
            </footer>
            <!-- / Footer -->

            <div class="content-backdrop fade"></div>
          </div>
          <!-- Content wrapper -->
        </div>
        <!-- / Layout page -->
      </div>

      <!-- Overlay -->
      <div class="layout-overlay layout-menu-toggle"></div>

      <!-- Drag Target Area To SlideIn Menu On Small Screens -->
      <div class="drag-target"></div>
    </div>
    <!-- / Layout wrapper -->

    <!-- Core JS -->

    <!-- build:js assets/vendor/js/theme.js  -->

    <script src="{% static 'website/js/vendor/libs/jquery/jquery.js' %}"></script>
    <script src="{% static 'website/js/vendor/libs/popper/popper.js' %}"></script>
    <script src="{% static 'website/js/bootstrap.js' %}"></script>
    <script src="{% static 'website/js/vendor/libs/node-waves/node-waves.js' %}"></script>
    <script src="{% static 'website/js/vendor/libs/@algolia/autocomplete-js.js' %}"></script>
    <script src="{% static 'website/js/vendor/libs/pickr/pickr.js' %}"></script>
    <script src="{% static 'website/js/vendor/libs/perfect-scrollbar/perfect-scrollbar.js' %}"></script>
    <script src="{% static 'website/js/vendor/libs/hammer/hammer.js' %}"></script>
    <script src="{% static 'website/js/vendor/libs/i18n/i18n.js' %}"></script>

    <script src="{% static 'website/js/vendor/menu.js' %}"></script>


    <!-- endbuild -->

    <!-- Vendors JS -->
    <script src="{% static 'website/js/vendor/libs/shepherd/shepherd.js' %}"></script>

    <!-- Main JS -->

    <script type="text/javascript" src="{% static 'website/js/main.js' %}"></script>

    <!-- For the top header to work -->
    <script type="text/javascript" src="{% static 'website/js/vendors.min.js' %}"></script>

    <!-- Page JS -->
    <script src="{% static 'website/js/extended-ui-tour.js' %}"></script>
    
    <!-- Auto-start tour when page loads -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // Small delay to ensure everything is loaded
        setTimeout(function() {
          const startBtn = document.querySelector('#shepherd-example');
          if (startBtn) {
            startBtn.click(); // Automatically start the tour
          }
        }, 500);
      });
    </script>
  </body>
</html>
