# Reference Nginx config for consulting.edunade.com
# Copy to /etc/nginx/sites-available/consulting on the server.
# Certbot will add SSL lines to the 443 server block.

server {
    listen 80;
    server_name consulting.edunade.com www.consulting.edunade.com;

    client_max_body_size 12M;

    location /static/ {
        alias /home/ubuntu/Consulting_Platform/platform_edu/staticfiles/;
    }

    location /media/ {
        alias /home/ubuntu/Consulting_Platform/platform_edu/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
